<script>
(function(){
"use strict";
const LAT = 35.6895 * Math.PI/180, LON = 139.6917;   // 東京
const R = 90;                                        // 天球半径
const D2R = Math.PI/180;

// ---------- 時刻 → 地方恒星時 ----------
let simTime = Date.now();          // ms
let flowRate = 0;                  // 日周運動の倍速
function lstRad(ms){
  const d = ms/86400000 - 10957.5;                       // J2000からの日数
  let gmst = 280.46061837 + 360.98564736629 * d;         // 度
  let lst = (gmst + LON) % 360; if(lst<0) lst+=360;
  return lst * D2R;
}
// RA/Dec(度) → 地平座標の単位ベクトル(x=東, y=天頂, z=南)
function toHorizontal(raDeg, decDeg, lst, out){
  const ra = raDeg*D2R, dec = decDeg*D2R;
  const H = lst - ra;
  const sA = Math.sin(LAT)*Math.sin(dec) + Math.cos(LAT)*Math.cos(dec)*Math.cos(H);
  const alt = Math.asin(Math.max(-1,Math.min(1,sA)));
  const y = -Math.cos(dec)*Math.sin(H);
  const x = Math.sin(dec)*Math.cos(LAT) - Math.cos(dec)*Math.sin(LAT)*Math.cos(H);
  const az = Math.atan2(y, x);                            // 北=0, 東=+90°
  const ca = Math.cos(alt);
  out[0] = ca*Math.sin(az); out[1] = Math.sin(sA>=1?Math.PI/2:alt); out[2] = -ca*Math.cos(az);
  return alt;
}

// ---------- three.js ----------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 1.6, 0);
const camRig = new THREE.Group(); camRig.add(camera); scene.add(camRig);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// ---------- 大気（地平の光害グラデーション） ----------
{
  const geo = new THREE.SphereGeometry(R*1.6, 32, 24);
  const mat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false,
    vertexShader:`varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader:`varying vec3 vP;
      void main(){
        float h = normalize(vP).y;
        vec3 top = vec3(0.012,0.018,0.045);
        vec3 hor = vec3(0.10,0.115,0.16);          // 東京の空の明るさ
        float t = smoothstep(0.35,-0.02,h);
        vec3 c = mix(top, hor, t*t);
        gl_FragColor = vec4(c,1.0);
      }`
  });
  scene.add(new THREE.Mesh(geo, mat));
}

// ---------- 恒星 ----------
const N = SKYDATA.ra.length;
const starPos = new Float32Array(N*3);
const starCol = new Float32Array(N*3);
const starSize = new Float32Array(N);
function bvColor(bv){ // B-V色指数 → RGB近似
  const t = 4600*(1/(0.92*bv+1.7)+1/(0.92*bv+0.62));
  let r,g,b, T=t/100;
  r = T<=66 ? 255 : 329.7*Math.pow(T-60,-0.133);
  g = T<=66 ? 99.47*Math.log(T)-161.1 : 288.1*Math.pow(T-60,-0.0755);
  b = T>=66 ? 255 : (T<=19 ? 0 : 138.5*Math.log(T-10)-305.0);
  return [Math.min(255,Math.max(0,r))/255, Math.min(255,Math.max(0,g))/255, Math.min(255,Math.max(0,b))/255];
}
for(let i=0;i<N;i++){
  const m = SKYDATA.mag[i]/10;
  const c = bvColor(SKYDATA.bv[i]/100);
  const bright = Math.pow(10, -0.16*m);               // 等級→見かけの強さ
  const lum = Math.min(1, 0.28 + bright*0.75);
  starCol[i*3]=c[0]*lum; starCol[i*3+1]=c[1]*lum; starCol[i*3+2]=c[2]*lum;
  starSize[i] = Math.max(1.1, 7.5*Math.pow(10,-0.115*m));
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol,3));
starGeo.setAttribute('psize', new THREE.BufferAttribute(starSize,1));
const starMat = new THREE.ShaderMaterial({
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader:`attribute float psize; varying vec3 vC;
    void main(){ vC=color;
      vec4 mv = modelViewMatrix*vec4(position,1.0);
      gl_PointSize = psize * (140.0/-mv.z);
      gl_Position = projectionMatrix*mv; }`,
  fragmentShader:`varying vec3 vC;
    void main(){
      vec2 d = gl_PointCoord-vec2(0.5);
      float r = length(d)*2.0;
      float a = smoothstep(1.0,0.15,r);
      gl_FragColor = vec4(vC, a*a); }`,
  vertexColors:true
});
scene.add(new THREE.Points(starGeo, starMat));

// ---------- 星座線 ----------
const segs = [];   // [ra1,dec1,ra2,dec2]...
for(const c of SKYDATA.cons){
  for(const poly of c.l){
    for(let i=0;i<poly.length-1;i++) segs.push(poly[i][0],poly[i][1],poly[i+1][0],poly[i+1][1]);
  }
}
const NL = segs.length/4;
const linePos = new Float32Array(NL*6);
const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos,3));
const lineMat = new THREE.LineBasicMaterial({color:0x87a4d8, transparent:true, opacity:0.30});
const lineMesh = new THREE.LineSegments(lineGeo, lineMat);
scene.add(lineMesh);

// ---------- 星座名ラベル ----------
function makeLabel(text){
  const cv = document.createElement('canvas');
  const ctx = cv.getContext('2d');
  ctx.font = '30px "Hiragino Mincho ProN","Yu Mincho",serif';
  const w = Math.ceil(ctx.measureText(text).width)+16;
  cv.width = w; cv.height = 44;
  const c2 = cv.getContext('2d');
  c2.font = '30px "Hiragino Mincho ProN","Yu Mincho",serif';
  c2.fillStyle = 'rgba(216,198,144,0.82)';
  c2.textBaseline='middle'; c2.fillText(text, 8, 24);
  const tex = new THREE.CanvasTexture(cv);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false, opacity:0.85}));
  spr.scale.set(w*0.055, 44*0.055, 1);
  return spr;
}
const labelGroup = new THREE.Group(); scene.add(labelGroup);
const labels = SKYDATA.cons.map(c=>{
  const s = makeLabel(c.ja); s.userData.c = c.c; labelGroup.add(s); return s;
});

// ---------- 地面・方位・街のシルエット ----------
{
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(R*1.7, 64),
    new THREE.MeshBasicMaterial({color:0x05070c})
  );
  ground.rotation.x = -Math.PI/2; ground.position.y = -0.4;
  scene.add(ground);

  // 東京のビルのシルエット(地平をぐるり)
  const bmat = new THREE.MeshBasicMaterial({color:0x090b12});
  const city = new THREE.Group();
  let seed = 7;
  const rnd = ()=> (seed = (seed*16807)%2147483647)/2147483647;
  for(let a=0;a<Math.PI*2;a+=0.045+rnd()*0.03){
    const h = 1.2+rnd()*4.2, w = 2.4+rnd()*3.4;
    const b = new THREE.Mesh(new THREE.BoxGeometry(w,h,1.4), bmat);
    const r0 = R*0.985;
    b.position.set(Math.sin(a)*r0, h/2-0.4, -Math.cos(a)*r0);
    b.lookAt(0,h/2-0.4,0);
    city.add(b);
    if(rnd()>0.55){ // 窓明かり
      const win = new THREE.Mesh(new THREE.PlaneGeometry(0.28,0.2),
        new THREE.MeshBasicMaterial({color:0x8a7a55, transparent:true, opacity:0.55}));
      win.position.set(Math.sin(a)*(r0-0.8), 0.3+rnd()*h*0.7, -Math.cos(a)*(r0-0.8));
      win.lookAt(0, win.position.y, 0);
      city.add(win);
    }
  }
  scene.add(city);

  const dirs = [['北',0],['東',90],['南',180],['西',270]];
  for(const [t,az] of dirs){
    const s = makeLabel(t);
    s.material.opacity = 0.95;
    s.scale.multiplyScalar(1.6);
    const a = az*D2R;
    s.position.set(Math.sin(a)*R*0.93, 6.5, -Math.cos(a)*R*0.93);
    scene.add(s);
  }
}

// ---------- 空の更新 ----------
const tmp = [0,0,0];
function updateSky(){
  const lst = lstRad(simTime);
  for(let i=0;i<N;i++){
    toHorizontal(SKYDATA.ra[i], SKYDATA.dec[i], lst, tmp);
    starPos[i*3]=tmp[0]*R; starPos[i*3+1]=tmp[1]*R; starPos[i*3+2]=tmp[2]*R;
  }
  starGeo.attributes.position.needsUpdate = true;
  for(let i=0;i<NL;i++){
    toHorizontal(segs[i*4],segs[i*4+1],lst,tmp);
    linePos[i*6]=tmp[0]*R; linePos[i*6+1]=tmp[1]*R; linePos[i*6+2]=tmp[2]*R;
    toHorizontal(segs[i*4+2],segs[i*4+3],lst,tmp);
    linePos[i*6+3]=tmp[0]*R; linePos[i*6+4]=tmp[1]*R; linePos[i*6+5]=tmp[2]*R;
  }
  lineGeo.attributes.position.needsUpdate = true;
  for(const s of labels){
    const alt = toHorizontal(s.userData.c[0], s.userData.c[1], lst, tmp);
    s.visible = labelGroup.visible && alt > 0.02;
    s.position.set(tmp[0]*R*0.97, tmp[1]*R*0.97, tmp[2]*R*0.97);
  }
  const d = new Date(simTime);
  const z = n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${d.getMonth()+1}月${d.getDate()}日 ${z(d.getHours())}:${z(d.getMinutes())} JST`;
}
updateSky();

// ---------- 操作(非VR) ----------
let yaw = Math.PI, pitch = 0.18;   // 初期視線: 南の空へ
let dragging=false, px=0, py=0;
function applyLook(){
  camera.rotation.set(0,0,0);
  camera.rotateY(yaw); camera.rotateX(pitch);
}
applyLook();
const el = renderer.domElement;
el.addEventListener('pointerdown', e=>{dragging=true;px=e.clientX;py=e.clientY;el.setPointerCapture(e.pointerId);});
el.addEventListener('pointermove', e=>{
  if(!dragging) return;
  yaw   -= (e.clientX-px)*0.0032*(camera.fov/65);
  pitch -= (e.clientY-py)*0.0032*(camera.fov/65);
  pitch = Math.max(-1.45, Math.min(1.5, pitch));
  px=e.clientX; py=e.clientY; applyLook();
});
el.addEventListener('pointerup', ()=>dragging=false);
el.addEventListener('wheel', e=>{
  camera.fov = Math.max(25, Math.min(95, camera.fov + e.deltaY*0.03));
  camera.updateProjectionMatrix();
},{passive:true});

// ---------- HUD ----------
const $ = id=>document.getElementById(id);
$('tm1').onclick = ()=>{ simTime -= 3600000; updateSky(); };
$('tp1').onclick = ()=>{ simTime += 3600000; updateSky(); };
$('tnow').onclick = ()=>{ simTime = Date.now(); updateSky(); };
function toggle(btn, fn){
  btn.onclick = ()=>{ const on = btn.getAttribute('aria-pressed')!=='true';
    btn.setAttribute('aria-pressed', on); fn(on); };
}
toggle($('tglLines'), on=>{ lineMesh.visible = on; });
toggle($('tglNames'), on=>{ labelGroup.visible = on; updateSky(); });
toggle($('tglFlow'), on=>{ flowRate = on ? 600 : 0; });

// ---------- WebXR ----------
const vrbtn = $('vrbtn');
if(navigator.xr && navigator.xr.isSessionSupported){
  navigator.xr.isSessionSupported('immersive-vr').then(ok=>{ if(ok) vrbtn.style.display='block'; });
}
vrbtn.onclick = async ()=>{
  try{
    const session = await navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor']});
    session.addEventListener('end', ()=>{ document.getElementById('hud').style.display=''; vrbtn.style.display='block'; });
    await renderer.xr.setSession(session);
    document.getElementById('hud').style.display='none'; vrbtn.style.display='none';
  }catch(e){ alert('VRセッションを開始できませんでした: '+e.message); }
};

// ---------- ループ ----------
let last = performance.now(), acc = 0;
renderer.setAnimationLoop((t)=>{
  const dt = t-last; last = t;
  if(flowRate>0){ simTime += dt*flowRate; acc += dt; if(acc>120){acc=0; updateSky();} }
  else { acc += dt; if(acc>15000){acc=0; if(Math.abs(Date.now()-simTime)<20000) simTime=Date.now(); updateSky(); } }
  renderer.render(scene, camera);
});
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
})();
</script>
